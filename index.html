<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // Workaround for sandboxed environments where window.fetch is a read-only getter.
      // Defining a custom getter and setter prevents transitive polyfills (like formdata-polyfill) from crashing on boot.
      (function() {
        try {
          var originalFetch = window.fetch;
          if (originalFetch) {
            var customFetch = originalFetch;
            Object.defineProperty(window, 'fetch', {
              get: function() {
                return customFetch;
              },
              set: function(val) {
                customFetch = val;
              },
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          try {
            var originalFetchProto = Window.prototype.fetch;
            if (originalFetchProto) {
              var customFetchProto = originalFetchProto;
              Object.defineProperty(Window.prototype, 'fetch', {
                get: function() {
                  return customFetchProto;
                },
                set: function(val) {
                  customFetchProto = val;
                },
                configurable: true,
                enumerable: true
              });
            }
          } catch (err) {
            console.warn("Could not patch window.fetch with getter/setter:", err);
          }
        }
      })();
    </script>
    <title>Aarasta Studio</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
